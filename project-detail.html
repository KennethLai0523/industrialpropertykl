<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Detail | Industrial Property KL</title>

  <link rel="stylesheet" href="shared-layout.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .hero {
      height: 400px;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: end;
      padding: 40px;
      color: white;
      font-size: 32px;
      font-weight: bold;
    }

    .section {
      background: white;
      margin-top: 20px;
      padding: 25px;
      border-radius: 12px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      border-radius: 8px;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #d9a73f;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div id="site-header"></div>

<div id="hero" class="hero"></div>

<div class="container">

  <div class="section">
    <h2 id="title"></h2>
    <p id="location"></p>
    <p id="shortDescription"></p>
  </div>

  <div class="section">
    <h2>Project Details</h2>
    <p id="fullContent"></p>
  </div>

  <div class="section">
    <h2>Gallery</h2>
    <div id="gallery" class="gallery"></div>
  </div>

  <div class="section">
    <h2>Enquiry</h2>
    <a class="btn" href="https://wa.me/60166287357" target="_blank">
      WhatsApp Kenneth
    </a>
  </div>

</div>

<div id="site-footer"></div>
<script type="module" src="shared-layout.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyANrifzDiBgsM8MpFSbe-kxW_e89vKbCZ8",
  authDomain: "industrialpropertykl.firebaseapp.com",
  projectId: "industrialpropertykl",
  storageBucket: "industrialpropertykl.firebasestorage.app",
  messagingSenderId: "612612953532",
  appId: "1:612612953532:web:94f956f783cb948db887b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function slugify(text) {
  return (text || "")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9\s-]/g, "")
    .replace(/\s+/g, "-")
    .replace(/-+/g, "-");
}

async function loadProject() {
  try {
    const currentPage = window.location.pathname.split("/").pop().replace(".html", "");
    const pageSlug = slugify(currentPage);

    const q = query(
      collection(db, "projects"),
      where("slug", "==", pageSlug)
    );

    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      document.querySelector(".container").innerHTML = `
        <div class="section">
          <h2>Project not found</h2>
          <p>No project matched this page slug: ${pageSlug}</p>
        </div>
      `;
      return;
    }

    const data = snapshot.docs[0].data();

    document.getElementById("title").innerText = data.title || "";
    document.getElementById("location").innerText = data.location || "";
    document.getElementById("shortDescription").innerText = data.shortDescription || "";
    document.getElementById("fullContent").innerText = data.fullContent || "";

    const hero = document.getElementById("hero");
    if (data.coverImage) {
      hero.style.backgroundImage = `url('${data.coverImage}')`;
    }
    hero.innerText = data.title || "";

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    if (Array.isArray(data.galleryImages)) {
      data.galleryImages.forEach(img => {
        const image = document.createElement("img");
        image.src = img;
        image.alt = data.title || "Project image";
        gallery.appendChild(image);
      });
    }
  } catch (error) {
    console.error(error);
    document.querySelector(".container").innerHTML = `
      <div class="section">
        <h2>Error loading project</h2>
        <p>Please check console and Firebase query.</p>
      </div>
    `;
  }
}

loadProject();
</script>

</body>
</html>
