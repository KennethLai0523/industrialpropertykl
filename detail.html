<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Details</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.main {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 20px;
}

.image {
  width: 100%;
  height: 400px;
  object-fit: cover;
  border-radius: 10px;
}

.price {
  font-size: 28px;
  font-weight: bold;
}

.title {
  font-size: 24px;
  margin: 10px 0;
}

.meta {
  color: gray;
  margin-bottom: 10px;
}

.spec {
  margin: 10px 0;
}

.whatsapp {
  background: #25D366;
  color: white;
  padding: 12px;
  display: block;
  text-align: center;
  border-radius: 8px;
  font-weight: bold;
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="container">

<div id="loading">Loading...</div>

<div id="content" style="display:none;">
  
  <div class="main">

    <div>
      <img id="image" class="image">
      <div class="card">
        <div id="price" class="price"></div>
        <div id="title" class="title"></div>
        <div id="location" class="meta"></div>

        <div class="spec"><strong>Type:</strong> <span id="type"></span></div>
        <div class="spec"><strong>Built-up:</strong> <span id="bua"></span></div>
        <div class="spec"><strong>Category:</strong> <span id="category"></span></div>
        <div class="spec"><strong>Status:</strong> <span id="status"></span></div>

        <hr>

        <div id="description"></div>
      </div>
    </div>

    <div class="card">
      <h3>Contact Agent</h3>
      <p>Kenneth Lai</p>

      <a id="wa" class="whatsapp" target="_blank">
        WhatsApp Now
      </a>
    </div>

  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyANrifzDiBgsM8MpFSbe-kxW_e89vKbCZ8",
  authDomain: "industrialpropertykl.firebaseapp.com",
  projectId: "industrialpropertykl",
  storageBucket: "industrialpropertykl.firebasestorage.app",
  messagingSenderId: "612612953532",
  appId: "1:612612953532:web:94f956f783cb948db887b9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadData() {

  if (!id) return;

  const docRef = doc(db, "listings", id);
  const snap = await getDoc(docRef);

  if (!snap.exists()) {
    document.getElementById("loading").innerText = "Not found";
    return;
  }

  const data = snap.data();

  document.getElementById("image").src = data.image;
  document.getElementById("price").innerText = data.price;
  document.getElementById("title").innerText = data.title;
  document.getElementById("location").innerText = data.location + ", " + data.state;

  document.getElementById("type").innerText = data.type;
  document.getElementById("bua").innerText = data.bua;
  document.getElementById("category").innerText = data.category;
  document.getElementById("status").innerText = data.status;

  document.getElementById("description").innerText = data.description;

  const msg = `Hi Kenneth, I am interested in ${data.title}`;
  document.getElementById("wa").href =
    "https://wa.me/60166287357?text=" + encodeURIComponent(msg);

  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";
}

loadData();

</script>

</body>
</html>
